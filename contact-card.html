<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Business Card</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1b477b, #0d1a2d);
            color: #ffffff;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Card Container -->
    <div class="bg-[#122c4f]/80 backdrop-blur-lg rounded-3xl shadow-2xl p-8 max-w-sm w-full text-center border border-[#3b70a8]/50 relative overflow-hidden">
        
        <!-- Decorative background glow elements mimicking the network nodes -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-[#a33bb5]/25 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-32 h-32 bg-[#2dc29d]/25 rounded-full blur-3xl -ml-10 -mb-10 pointer-events-none"></div>

        <!-- Profile Picture -->
        <div class="relative z-10 w-32 h-32 mx-auto rounded-full bg-gradient-to-tr from-[#2dc29d] to-[#a33bb5] p-1 mb-5 shadow-[0_0_15px_rgba(45,194,157,0.4)]">
            <img src="https://i.pravatar.cc/150?img=11" alt="Profile Picture" class="w-full h-full rounded-full object-cover border-4 border-[#0d1a2d] bg-[#0d1a2d]">
        </div>

        <!-- Contact Info -->
        <h1 class="relative z-10 text-2xl font-bold text-white">Ahmed Al Balushi</h1>
        <p class="relative z-10 text-xs font-bold text-[#2dc29d] uppercase tracking-widest mt-1 mb-1">Systems Engineer</p>
        <p class="relative z-10 text-[#91bde6] mb-6 text-sm">Royal Oman Police</p>

        <!-- Contact Details -->
        <div class="relative z-10 space-y-3 mb-8 text-left">
            <!-- Phone -->
            <a href="tel:+96899999999" class="flex items-center text-gray-200 bg-white/5 hover:bg-white/10 p-3 rounded-xl transition-all border border-white/5 hover:border-[#2dc29d]/50 group cursor-pointer">
                <div class="bg-[#0d1a2d] p-2 rounded-lg shadow-sm mr-3 group-hover:shadow-[0_0_10px_rgba(45,194,157,0.3)] transition-shadow">
                    <svg class="w-5 h-5 text-[#2dc29d]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                </div>
                <span class="text-sm font-medium">+968 9999 9999</span>
            </a>
            
            <!-- Email -->
            <a href="mailto:ahmed@rop.gov.om" class="flex items-center text-gray-200 bg-white/5 hover:bg-white/10 p-3 rounded-xl transition-all border border-white/5 hover:border-[#a33bb5]/50 group cursor-pointer">
                <div class="bg-[#0d1a2d] p-2 rounded-lg shadow-sm mr-3 group-hover:shadow-[0_0_10px_rgba(163,59,181,0.3)] transition-shadow">
                    <svg class="w-5 h-5 text-[#a33bb5]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                </div>
                <span class="text-sm font-medium">ahmed@rop.gov.om</span>
            </a>
        </div>

        <!-- Download Button -->
        <button id="downloadVcfBtn" class="relative z-10 w-full bg-gradient-to-r from-[#1b477b] to-[#2b6ba8] hover:from-[#235896] hover:to-[#3b70a8] text-white font-semibold py-3.5 px-6 rounded-xl border border-[#3b70a8] shadow-lg shadow-[#0d1a2d]/80 transform transition hover:-translate-y-0.5 flex items-center justify-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            Save Contact (vCard)
        </button>
    </div>

    <!-- JavaScript to generate and download the .vcf file -->
    <script>
        document.getElementById('downloadVcfBtn').addEventListener('click', () => {
            // Standard vCard 3.0 Format
            const vcard = `BEGIN:VCARD
VERSION:3.0
N:Al Balushi;Ahmed;;;
FN:Ahmed Al Balushi
ORG:Royal Oman Police
TITLE:Systems Engineer
TEL;TYPE=WORK,VOICE:+968 9999 9999
EMAIL;TYPE=PREF,INTERNET:ahmed@rop.gov.om
URL:https://rop.gov.om
NOTE:Generated via Digital Business Card
END:VCARD`;

            // Create a Blob with the vCard content
            const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
            
            // Create a temporary link element
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'ahmed_albalushi.vcf';
            
            // Trigger the download
            document.body.appendChild(link);
            link.click();
            
            // Clean up
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
        });
    </script>
</body>
</html>
