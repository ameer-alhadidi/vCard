<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>vCard Generator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        input, button { width: 100%; margin-bottom: 10px; padding: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h2>vCard Generator</h2>
    <input type="text" id="firstName" placeholder="First Name" required>
    <input type="text" id="lastName" placeholder="Last Name">
    <input type="tel" id="phone" placeholder="Phone">
    <input type="email" id="email" placeholder="Email">
    <button onclick="generateVCF()">Download .vcf File</button>
</div>
<script>
function generateVCF() {
    const fn = document.getElementById('firstName').value;
    const ln = document.getElementById('lastName').value;
    const ph = document.getElementById('phone').value;
    const em = document.getElementById('email').value;
    
    const vcard = `BEGIN:VCARD\nVERSION:3.0\nN:${ln};${fn}\nFN:${fn} ${ln}\nTEL:${ph}\nEMAIL:${em}\nEND:VCARD`;
    const blob = new Blob([vcard], { type: 'text/vcard' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `${fn}.vcf`;
    link.click();
}
</script>
</body>
</html>
