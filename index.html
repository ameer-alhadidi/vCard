<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vCard Download</title>
</head>
<body style="background-color: #ffffff; margin: 0;">

    <script>
        // 1. Define your contact details
        const contact = {
            firstName: "Ameer",
            lastName: "AlHadidi",
            phone: "+96899790787", 
            email: "ameer@rop.gov.om",
            title: "Software Engineer",
            company: "Tech Solutions LLC",
            address: "Al Maabilah, Seeb, Oman" 
        };

        // 2. Generate vCard v3.0 format
        function generateVCard() {
            return [
                "BEGIN:VCARD",
                "VERSION:3.0",
                `N:${contact.lastName};${contact.firstName};;;`,
                `FN:${contact.firstName} ${contact.lastName}`,
                `ORG:${contact.company}`,
                `TITLE:${contact.title}`,
                `TEL;TYPE=WORK,VOICE:${contact.phone}`,
                `EMAIL;TYPE=WORK,INTERNET:${contact.email}`,
                `ADR;TYPE=WORK:;;${contact.address}`,
                "END:VCARD"
            ].join("\n");
        }

        // 3. Trigger download automatically
        function downloadVCF() {
            const vcardText = generateVCard();
            const blob = new Blob([vcardText], { type: "text/vcard" });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            link.href = url;
            link.download = `${contact.firstName}_${contact.lastName}.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // Execute immediately when page loads
        document.addEventListener("DOMContentLoaded", downloadVCF);
    </script>
</body>
</html>
